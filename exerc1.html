<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestão de Atividade</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('botao');
            botao.addEventListener('click', verificar);
        }

        function verificar() {
            let temperatura = Number(document.getElementById('temperatura').value);
            let vento       = Number(document.getElementById('vento').value);
            let umidade     = Number(document.getElementById('umidade').value);

            let imagem  = document.getElementById('figura');
            let texto   = document.getElementById('resultado');

            if (temperatura > 28 && vento < 15 && umidade < 70) {
                imagem.src   = 'piscina.png';
                texto.innerHTML = 'Sugestão: Piscina';
            } else if (temperatura > 20 && temperatura < 26 && vento < 20 && umidade < 80) {
                imagem.src   = 'futebol.png';
                texto.innerHTML = 'Sugestão: Futebol';
            } else if (temperatura > 18 && vento > 25 && umidade < 60) {
                imagem.src   = 'pipa.png';
                texto.innerHTML = 'Sugestão: Empinar Pipa';
            } else if (temperatura < 15 || umidade > 85) {
                imagem.src   = 'cinema.png';
                texto.innerHTML = 'Sugestão: Cinema';
            } else {
                imagem.src   = '';
                texto.innerHTML = 'Nenhuma sugestão para essas condições.';
            }
        }
    </script>
</head>

<body>
    <h1>Sugestão de Atividade</h1>

    <label for="temperatura">Temperatura (°C):</label>
    <input type="number" id="temperatura"><br><br>

    <label for="vento">Vento (km/h):</label>
    <input type="number" id="vento"><br><br>

    <label for="umidade">Umidade (%):</label>
    <input type="number" id="umidade"><br><br>

    <input type="button" value="Ver sugestão" id="botao">

    <p id="resultado"></p>
    <img src="" alt="" id="figura" width="300px">
</body>

</html>
